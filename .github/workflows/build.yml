name: Build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: TypeScript + Electron build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install
        # `npm install` rather than `npm ci`. npm 11 omits transitive
        # optional platform binaries from the lock file when they can't be
        # installed on the host that generated it (cross-platform native
        # tarballs from vitest/vite/esbuild), and `npm ci` then refuses to
        # proceed because the entries it expects are absent. `npm install`
        # is permissive about this and resolves the same package versions.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: TypeScript build
        run: npm run build

      - name: Test
        run: npm test

      - name: Electron bundle
        run: npm run build -w @peerkit-video-chat/desktop

  ci_pass:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: check status
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
