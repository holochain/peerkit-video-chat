name: Release

# Packaging the desktop app on three OSes is slow and produces a published
# release, so it runs only for version tags (e.g. v0.1.0) — not on every push.
# The fast typecheck/test/bundle still runs per-PR in build.yml.
on:
  push:
    tags:
      - "v*"

# Least privilege by default; the release job widens to contents: write.
permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: package:linux
          - os: macos-latest
            script: package:mac
          - os: windows-latest
            script: package:win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      # See build.yml: npm 11 omits cross-platform optional binaries from the
      # lock file, so `npm ci` would refuse to proceed. `npm install` resolves
      # the same versions and is permissive about the missing entries.
      - name: Install
        run: npm install --no-audit --no-fund --prefer-offline

      # Tag is the source of truth for the version. Write it into the desktop
      # package.json before the build so it flows into the in-app version
      # (__APP_VERSION__, baked by electron-vite), the installer metadata, and
      # the artifact names. Not committed — only set for this build. Non-tag
      # runs (branch/dispatch) keep the committed 0.0.0 dev version.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "release version: $ver"
          npm pkg set version="$ver" -w @peerkit-video-chat/desktop

      - name: Build desktop bundle
        run: npm run build -w @peerkit-video-chat/desktop

      - name: Package installers
        run: npm run ${{ matrix.script }} -w @peerkit-video-chat/desktop -- --publish never
        env:
          # Unsigned builds for now — don't let electron-builder hunt for a
          # signing identity on macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.pkg
            apps/desktop/release/*.msi

      # Install the deb and launch the binary headless to catch crash-on-start
      # regressions (missing libs, the SUID-sandbox mode, spaces in the install
      # path breaking the zygote self-exec) that only surface from a real
      # install. There's no UI to drive — we just assert it doesn't die on boot.
      # --no-sandbox keeps it deterministic across runners; the SUID sandbox
      # itself is validated by the postinst.
      - name: Smoke-test Linux packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xvfb ./apps/desktop/release/*.deb

          # Postinst must leave the SUID sandbox owned by root, mode 4755
          # (Ubuntu 24.04+ blocks the userns sandbox at runtime).
          perms="$(stat -c '%a %U' '/opt/PeerKit-Video-Chat/chrome-sandbox')"
          echo "chrome-sandbox: $perms"
          if [ "$perms" != "4755 root" ]; then
            echo "::error::chrome-sandbox is '$perms', expected '4755 root'"; exit 1
          fi

          # Launch headless and confirm it stays up. Run with --no-sandbox so
          # the result doesn't depend on the runner's userns policy; the sandbox
          # mode itself is asserted above. Hard-kill after the window so we don't
          # trip on Electron's noisy headless *shutdown* path.
          smoke() {
            local name="$1"; shift
            echo "::group::smoke $name"
            "$@" --no-sandbox >/tmp/smoke.log 2>&1 &
            local pid=$!
            sleep 12
            local alive=0
            kill -0 "$pid" 2>/dev/null && alive=1
            kill -9 "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
            cat /tmp/smoke.log
            echo "::endgroup::"
            if [ "$alive" -ne 1 ]; then
              echo "::error::$name exited before finishing startup"; return 1
            fi
            if grep -qiE "failed to execvp|cannot open shared object|symbol lookup error|SUID sandbox helper" /tmp/smoke.log; then
              echo "::error::$name crash signature on launch"; return 1
            fi
            echo "OK: $name survived launch"
          }

          # Installed deb binary (on PATH via /usr/bin symlink).
          smoke "deb" xvfb-run -a peerkit-video-chat
          # AppImage, extracted (CI runners have no FUSE).
          appimage="$(ls apps/desktop/release/*.AppImage)"
          chmod +x "$appimage"
          export APPIMAGE_EXTRACT_AND_RUN=1
          smoke "AppImage" xvfb-run -a "$appimage"

      # Install the pkg and launch the bundled binary; assert it stays up.
      # The runner has a window server, and a locally-built app carries no
      # com.apple.quarantine attribute, so Gatekeeper doesn't block it.
      - name: Smoke-test macOS package
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          pkg="$(ls apps/desktop/release/*.pkg)"
          sudo installer -pkg "$pkg" -target /
          app_dir="$(ls -d /Applications/*.app | grep -i peerkit | head -1)"
          bin="$app_dir/Contents/MacOS/$(ls "$app_dir/Contents/MacOS" | head -1)"
          echo "binary: $bin"
          test -x "$bin" || { echo "::error::installed binary missing"; exit 1; }
          "$bin" >/tmp/smoke.log 2>&1 &
          pid=$!
          sleep 12
          alive=0
          kill -0 "$pid" 2>/dev/null && alive=1
          kill -9 "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          cat /tmp/smoke.log || true
          if [ "$alive" -ne 1 ]; then
            echo "::error::macOS app exited before finishing startup"; exit 1
          fi
          if grep -qiE "dyld|Library not loaded|Symbol not found|Abort trap" /tmp/smoke.log; then
            echo "::error::macOS crash signature on launch"; exit 1
          fi
          echo "OK: pkg survived launch"

      # Install the msi silently and launch the installed exe; assert it stays up.
      - name: Smoke-test Windows package
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = Get-ChildItem apps/desktop/release/*.msi | Select-Object -First 1
          $log = Join-Path $env:RUNNER_TEMP 'msi-install.log'
          Write-Output "installing $($msi.Name)"
          $proc = Start-Process msiexec -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart /l*v `"$log`"" -Wait -PassThru
          Write-Output "msiexec exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Output "---- msi log tail ----"; Get-Content $log -Tail 40
            Write-Error "msi install failed ($($proc.ExitCode))"; exit 1
          }
          # The registry uninstall entry has no InstallLocation, so read the
          # resolved install dir from the verbose log's APPLICATIONFOLDER target
          # property (ground truth — this is the install path, not the source).
          $line = Select-String -Path $log -Pattern 'Property\(S\): APPLICATIONFOLDER = (.+?)\s*$' | Select-Object -Last 1
          $dir = if ($line) { $line.Matches[0].Groups[1].Value.Trim().TrimEnd('\') }
          Write-Output "install dir: $dir"
          if (-not $dir -or -not (Test-Path $dir)) {
            Write-Output "---- APPLICATIONFOLDER lines ----"
            Select-String -Path $log -Pattern 'APPLICATIONFOLDER' | Select-Object -First 10 | ForEach-Object { $_.Line }
            Write-Error "could not resolve install dir"; exit 1
          }
          $exe = Get-ChildItem $dir -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'peerkit' } | Select-Object -First 1
          if (-not $exe) {
            Write-Output "exe under install dir:"; Get-ChildItem $dir -Recurse -Filter '*.exe' | ForEach-Object { $_.FullName }
            Write-Error "installed exe not found in $dir"; exit 1
          }
          Write-Output "launching $($exe.FullName)"
          $p = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 12
          if ($p.HasExited) { Write-Error "Windows app exited before startup (code $($p.ExitCode))"; exit 1 }
          Stop-Process -Id $p.Id -Force
          Write-Output "OK: msi survived launch"

  # Publish once, after every platform has packaged, so the release is created
  # a single time with the full set of installers (no concurrent-create race).
  release:
    name: Publish release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s globstar nullglob
          files=(dist/**/*.AppImage dist/**/*.deb dist/**/*.pkg dist/**/*.msi)
          # Mark semver prerelease tags (v1.2.3-rc.1, v0.0.0-test.1, …) as
          # pre-releases so they don't become the repo's "Latest".
          prerelease=()
          [[ "$GITHUB_REF_NAME" == *-* ]] && prerelease=(--prerelease)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --title "$GITHUB_REF_NAME" --generate-notes "${prerelease[@]}"
