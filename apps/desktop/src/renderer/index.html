<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>peerkit-video-chat</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        background: #111;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 10px 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      header .label {
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 11px;
        font-weight: 600;
      }
      header .agent { font-family: monospace; color: #6c8; }
      header .room { font-weight: 600; }
      header .spacer { flex: 1; }
      input, button {
        background: #222;
        color: #eee;
        border: 1px solid #333;
        padding: 6px 10px;
        font-family: inherit;
        font-size: 13px;
      }
      button {
        background: #2a5;
        border-color: #2a5;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #333;
        border-color: #444;
        color: #ccc;
      }
      button:disabled { background: #333; color: #666; cursor: default; border-color: #333; }
      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      aside {
        width: 220px;
        background: #161616;
        border-right: 1px solid #2a2a2a;
        padding: 12px;
        overflow-y: auto;
      }
      aside h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #888;
        margin: 0 0 8px;
      }
      aside ul { list-style: none; padding: 0; margin: 0; }
      aside li {
        padding: 6px 0;
        font-size: 13px;
        border-bottom: 1px solid #222;
      }
      aside li .id { font-family: monospace; font-size: 10px; color: #666; display: block; }
      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        color: #888;
      }
      .empty-state input { width: 280px; }
      .chat-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
      }
      .chat-msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
      .chat-msg .who { color: #8cf; font-weight: 600; margin-right: 6px; }
      .chat-msg .ts { color: #555; font-size: 11px; margin-left: 6px; }
      .chat-input {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid #2a2a2a;
        background: #161616;
      }
      .chat-input input { flex: 1; }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .modal {
        background: #1d1d1d;
        border: 1px solid #333;
        padding: 20px;
        min-width: 340px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .modal h2 {
        margin: 0;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #ccc;
      }
      .modal label { font-size: 12px; color: #888; }
      .error {
        color: #f88;
        font-size: 12px;
        padding: 8px 16px;
        background: #2a1a1a;
        border-top: 1px solid #4a2a2a;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="name-modal" class="modal-backdrop">
      <div class="modal">
        <h2>Set your display name</h2>
        <label for="name-input">Other people in your rooms will see this.</label>
        <input id="name-input" placeholder="Display name" autofocus />
        <button id="name-submit">Continue</button>
        <div id="name-error" class="error hidden"></div>
      </div>
    </div>

    <header class="hidden" id="app-header">
      <span class="label">You</span>
      <span class="agent" id="self-agent">…</span>
      <span class="spacer"></span>
      <span class="label">Name</span>
      <input id="name-edit" style="width: 140px" />
      <span class="label">Room</span>
      <span id="room-label">not in a room</span>
      <button id="leave-btn" class="secondary hidden">Leave</button>
    </header>

    <main class="hidden" id="app-main">
      <aside id="roster-pane" class="hidden">
        <h2>In the room</h2>
        <ul id="roster"></ul>
      </aside>

      <div class="chat-pane">
        <div id="empty" class="empty-state">
          <div>Join a room to start chatting.</div>
          <div style="display: flex; gap: 8px;">
            <input id="room-input" placeholder="Room name (e.g. standup)" />
            <button id="join-btn">Join</button>
          </div>
        </div>

        <div id="chat" class="chat-pane hidden">
          <div class="chat-log" id="chat-log"></div>
          <div class="chat-input">
            <input id="chat-input" placeholder="Message" />
            <button id="chat-send">Send</button>
          </div>
        </div>
      </div>
    </main>

    <div id="global-error" class="error hidden"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
