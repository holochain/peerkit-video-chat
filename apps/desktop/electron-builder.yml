appId: org.holochain.peerkit-video-chat
# No spaces: a space in productName becomes a space in the Linux install path
# (/opt/<productName>), which breaks Electron's zygote self-exec on Linux
# (FATAL "failed to execvp: /opt/PeerKit").
productName: PeerKit-Video-Chat
# electron is hoisted to the workspace root, so electron-builder can't infer the
# version from apps/desktop/node_modules. Pin it (keep in sync with the electron
# devDependency in package.json).
electronVersion: 42.2.0
# No code signing for now — see CSC_IDENTITY_AUTO_DISCOVERY=false in CI.
directories:
  output: release
  buildResources: build
# Avoid the scoped npm name (@peerkit-video-chat/desktop) leaking into artifact
# paths/filenames.
artifactName: peerkit-video-chat-${version}-${arch}.${ext}
executableName: peerkit-video-chat
# electron-vite emits the runnable app to out/; everything else is bundled in.
files:
  - out/**/*
  - package.json
  - "!**/*.{map,ts,tsbuildinfo}"
# cbor-extract (via PeerKit's serializer) ships a native .node addon that must
# stay outside the asar to be loadable.
asarUnpack:
  - "**/*.node"
# Ship the icon inside the app so the main process can set it as the runtime
# window/taskbar icon (the installed hicolor icons only cover the launcher).
extraResources:
  - from: build/icon.png
    to: icon.png
# CI installs the correct per-platform binaries already; don't rebuild.
npmRebuild: false
linux:
  target:
    - AppImage
    - deb
  category: Network
  maintainer: Holochain
  # Directory of <size>x<size>.png icons so the desktop has every size it needs
  # for the taskbar/dash (a lone 1024px icon isn't picked up).
  icon: build/icons
  desktop:
    # Match the runtime WM_CLASS/app_id (app.setName in the main process) so the
    # window associates with this entry and shows its icon. electron-builder
    # otherwise defaults StartupWMClass to productName, which doesn't match.
    StartupWMClass: peerkit-video-chat
deb:
  # Override the default postinst, which disables the SUID sandbox on hosts
  # where unprivileged user namespaces look usable at install time. Ubuntu
  # 24.04+ then blocks userns at runtime and Electron aborts. See the script.
  afterInstall: build/deb-after-install.sh
mac:
  target:
    - pkg
  category: public.app-category.social-networking
  identity: null
win:
  target:
    - msi
